deployment:
  enabled: false
env:
  color: yellow
  otel.exporter.otlp.compression: gzip
  otel.exporter.otlp.endpoint: http://localhost:4318
  spring.datasource.password: password
  spring.datasource.url: jdbc:mysql://invoices-db-dev.c6zsc86emfkx.us-east-1.rds.amazonaws.com:3306/mysql
  spring.datasource.username: admin
image:
  pullPolicy: Always
  repository: 290780715171.dkr.ecr.us-east-1.amazonaws.com/invoices
  tag: latest-main
imagePullSecrets:
  - regcred
ingress:
  annotations:
    app_root:
      enabled: false
      value: ""
    rewrite_target:
      enabled: false
      value: /
  host: invoices-dev.devkit.kaua.info
  tls:
    clusterIssuer: letsencrypt-prod
    enabled: false
port: 8080
rollout:
  canary:
    steps:
      - setWeight: 20
      - pause:
          duration: 10s
      - setWeight: 50
      - pause:
          duration: 1m
      - setWeight: 100
      - pause:
          duration: 1m
  enabled: true
  strategy: canary
spec:
  livenessProbe:
    failureThreshold: 3
    httpGet:
      path: /api/actuator/health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    failureThreshold: 3
    httpGet:
      path: /api/actuator/health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5
  replicas: 2
